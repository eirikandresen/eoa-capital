name: Update NAV Data

on:
  schedule:
    # Runs every weekday at 20:00 Oslo time (18:00 UTC)
    - cron: '0 18 * * 1-5'
  workflow_dispatch:

jobs:
  update-nav:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl requests

      - name: Update NAV data
        run: python scripts/update_nav.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nav_data.json
          git diff --staged --quiet || git commit -m "Auto-update NAV data $(date +'%Y-%m-%d')"
          git push
